app = "agent-vault"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[env]
  HOME = "/data"

[http_service]
  internal_port = 14321
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/health"
  timeout = "5s"

[mounts]
  source = "agent_vault_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
